name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk xvfb

    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip
        pip install Pillow ttkbootstrap

    - name: Verify signature
      run: python generar_firma.py

    - name: Syntax check
      run: |
        python -m py_compile main.py
        python -m py_compile ai_module.py
        python -m py_compile tts_module.py
        python -m py_compile audio.py
        python -m py_compile sounds.py
        python -m py_compile face_animation.py
        python -m py_compile ascii_art.py
        python -m py_compile progress_tracker.py
        python -m py_compile check_deps.py
        python -m py_compile install.py

    - name: Run tests
      run: |
        xvfb-run python test_all.py

    - name: Shell syntax check
      run: |
        bash -n luna.sh
        bash -n install.sh
        bash -n uninstall.sh
